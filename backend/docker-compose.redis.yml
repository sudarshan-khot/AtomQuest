version: '3.8'

# Minimal local Redis for development.
# Run: docker compose -f docker-compose.redis.yml up -d
# Stop: docker compose -f docker-compose.redis.yml down

services:
  redis:
    image: redis:7-alpine
    container_name: atomquest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_dev_data:
